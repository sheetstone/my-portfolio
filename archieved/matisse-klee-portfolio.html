<!--
  MATISSE ⇄ KLEE — themed portfolio prototype
  -------------------------------------------
  Same fanned card-stack deck, with a live theme toggle (top-right):
    · MATISSE — flat organic cut-outs, saturated colour-blocks, gouache texture, mobile-drift motion.
    · KLEE    — watercolour "magic-square" grid, muted earth/jewel tones, granular paper, still/settled motion.
  Switching crossfades the background field, recolours the deck, swaps the drifting shapes, and dials the motion.

  ===> EDIT the PROJECTS array (search "EDIT HERE"): title, subtitle, url, image (screenshot URL or null).
       Per-theme accent colours live in the THEMES object just below it.
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Caveat:wght@600&display=swap');
  :root{ --cream:#f3ecdb; --ink:#1c1410; --accent:#1b3fd4; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#a81a14;overflow:hidden;font-family:'Bricolage Grotesque',sans-serif;color:var(--cream);transition:background .8s ease;}
  #app{position:fixed;inset:0;} canvas{display:block;}
  .hud{position:fixed;z-index:5;pointer-events:none;}
  .title{top:30px;left:34px;} .title h1{font-weight:800;font-size:clamp(28px,5vw,52px);line-height:.92;letter-spacing:-1px;margin:0;text-shadow:3px 4px 0 rgba(0,0,0,.22);transition:color .6s;}
  .title span{display:block;margin-top:8px;font-weight:600;font-size:12px;letter-spacing:4px;text-transform:uppercase;transition:color .6s;}
  .sig{bottom:24px;left:36px;font-family:'Caveat',cursive;font-size:34px;opacity:.92;transform:rotate(-4deg);}
  .hint{bottom:26px;right:34px;text-align:right;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#ffe6c4;opacity:.85;transition:opacity .4s;line-height:1.9;}

  .themes{position:fixed;top:28px;right:28px;z-index:8;display:flex;gap:8px;}
  .themes button{font-family:inherit;font-weight:800;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:9px 15px;border-radius:30px;
    border:1.5px solid rgba(255,255,255,.55);background:rgba(0,0,0,.18);color:#fff;cursor:pointer;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);transition:all .25s;}
  .themes button.active{background:#fff;color:#1c1410;border-color:#fff;}

  .card{position:fixed;z-index:6;left:34px;top:50%;transform:translateY(-50%) translateX(-46px);width:330px;max-width:calc(100vw - 56px);
    background:var(--cream);color:var(--ink);border-radius:6px;padding:28px;box-shadow:10px 14px 0 rgba(0,0,0,.25);
    opacity:0;pointer-events:none;transition:opacity .45s ease, transform .45s cubic-bezier(.2,.8,.2,1), background .6s, color .6s;}
  .card.show{opacity:1;transform:translateY(-50%) translateX(0);pointer-events:auto;}
  .card .idx{font-weight:800;font-size:13px;letter-spacing:2px;color:var(--accent);}
  .card h2{font-weight:800;font-size:34px;line-height:1;margin:8px 0 6px;letter-spacing:-1px;}
  .card p{font-size:14px;line-height:1.6;opacity:.7;margin:0 0 22px;}
  .row{display:flex;gap:10px;}
  .btn{flex:1;text-align:center;text-decoration:none;font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:14px;border-radius:4px;cursor:pointer;transition:transform .15s;}
  .btn:hover{transform:translate(-2px,-2px);}
  .btn.visit{background:var(--accent);color:#fff;box-shadow:3px 3px 0 rgba(0,0,0,.25);}
  .btn.back{background:transparent;color:var(--ink);border:2px solid rgba(0,0,0,.2);}
  .loading{position:fixed;inset:0;z-index:9;display:flex;align-items:center;justify-content:center;background:#a81a14;font-weight:800;letter-spacing:5px;text-transform:uppercase;font-size:12px;color:#ffe6c4;transition:opacity .8s;}
  .loading.hide{opacity:0;pointer-events:none;}
</style>

<div id="app"></div>
<div class="themes">
  <button data-theme="matisse" class="active">Matisse</button>
  <button data-theme="klee">Klee</button>
</div>
<div class="hud title"><h1>Your<br>Name</h1><span>Selected Work · MMXXVI</span></div>
<div class="hud sig">— your signature</div>
<div class="hud hint" id="hint">hover · lift<br>click · open</div>
<div class="card" id="card">
  <div class="idx" id="cIdx">01 / 03</div><h2 id="cTitle">Project</h2><p id="cDesc">A short line.</p>
  <div class="row"><a class="btn visit" id="cVisit" target="_blank" rel="noopener noreferrer">Visit site ↗</a><a class="btn back" id="cBack">Back to deck</a></div>
</div>
<div class="loading" id="loading">mixing the paint</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================ EDIT HERE ============================ */
const PROJECTS = [
  { title:"Project One",   subtitle:"A live web app on Firebase. Replace with one line on what it does.", url:"https://your-project-one.web.app",   image:null },
  { title:"Project Two",   subtitle:"Your second deployed site. Swap in a screenshot and the real URL.",   url:"https://your-project-two.web.app",   image:null },
  { title:"Project Three", subtitle:"Your third deployed site. Click to draw it out of the deck.",          url:"https://your-project-three.web.app", image:null },
];
const THEMES = {
  matisse:{ bodyBg:'#a81a14', titleCss:'#f3ecdb', accentText:'#f6d36b', paper:'#f6f2e8', ink:'#1c1410', well:'#e7e2d6', sub:'#7a7060',
    motif:'✶', accents:['#1b3fd4','#2f9e57','#e8a712'], motion:1.0, palette:[0x1b3fd4,0xf4c20d,0x2f9e57,0x111111,0xf3ecdb,0xe85a1f] },
  klee:{    bodyBg:'#5d6b86', titleCss:'#f0e9d6', accentText:'#e0b15a', paper:'#efe6cf', ink:'#2a2118', well:'#e3d8bd', sub:'#6e6450',
    motif:'☉', accents:['#b5552f','#3f6f74','#c79a3e'], motion:0.4,  palette:[0xb5552f,0xc79a3e,0x6f7d5a,0x3f6f74,0x6a3f5b,0x2c3e72,0xb98a6a] },
};
/* ================================================================== */

const NOISE=`float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float vn(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));vec2 u=f*f*(3.-2.*f);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*vn(p);p*=2.;a*=.5;}return v;}`;

const app=document.getElementById('app'), root=document.documentElement;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,200); camera.position.set(0,-0.2,9);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.75)); renderer.setSize(innerWidth,innerHeight); app.appendChild(renderer.domElement);

/* ---- background field: crossfade Matisse colour-blocks ⇄ Klee watercolour grid ---- */
const bg=new THREE.Mesh(new THREE.PlaneGeometry(240,160),new THREE.ShaderMaterial({uniforms:{uTime:{value:0},uMix:{value:0}},
  vertexShader:`varying vec2 vP;void main(){vP=position.xy;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec2 vP;uniform float uTime,uMix;${NOISE}
  vec3 matisseField(vec2 vp){vec2 p=vp*0.045;float t=uTime*0.025;vec2 g=p+0.18*vec2(fbm(p*1.3+t),fbm(p*1.3-t));
    vec3 ver=vec3(.86,.21,.12),deep=vec3(.62,.11,.10),mar=vec3(.36,.07,.10),orn=vec3(.90,.40,.13);
    float bx=smoothstep(-.06,.06,sin(g.x*1.25)),by=smoothstep(-.06,.06,sin(g.y*1.05+.6));
    vec3 c=mix(mix(mar,deep,bx),mix(ver,orn,bx),by); c*=1.+(fbm(vp*2.8)-.5)*.10; return c*(0.93+0.07*fbm(vp*0.4));}
  vec3 kleeCol(float h){float b=floor(h*6.0);vec3 c;
    if(b<1.)c=vec3(.71,.33,.18);else if(b<2.)c=vec3(.78,.62,.25);else if(b<3.)c=vec3(.43,.49,.35);
    else if(b<4.)c=vec3(.25,.43,.46);else if(b<5.)c=vec3(.42,.25,.36);else c=vec3(.17,.24,.45);return c;}
  vec3 kleeField(vec2 w){vec2 wob=(vec2(fbm(w*0.8),fbm(w*0.8+9.0))-0.5)*0.22;
    vec2 cell=floor(w*0.62+wob); float h=hash(cell);
    vec3 base=kleeCol(h);
    base*=0.90+0.10*sin(w.y*4.5+hash(cell+2.0)*6.28);     // horizontal banding
    base*=0.86+0.22*fbm(w*3.5);                            // watercolour granulation
    vec2 gf=fract(w*0.62+wob);
    float ln=smoothstep(0.,.05,gf.x)*smoothstep(0.,.05,gf.y)*smoothstep(0.,.05,1.-gf.x)*smoothstep(0.,.05,1.-gf.y);
    base=mix(base*0.45,base,ln);                            // soft ink grid
    return base;}
  void main(){vec3 m=matisseField(vP),k=kleeField(vP);gl_FragColor=vec4(mix(m,k,uMix),1.);}`}));
bg.position.z=-30; scene.add(bg);

/* ---- themable shape material (gouache + watercolour grain, with opacity for crossfade) ---- */
const shapeBase=new THREE.ShaderMaterial({side:THREE.DoubleSide,transparent:true,depthWrite:false,
  uniforms:{uColor:{value:new THREE.Color(0xffffff)},uSeed:{value:0},uOpacity:{value:0},uGrain:{value:0}},
  vertexShader:`varying vec2 vP;void main(){vP=position.xy;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec2 vP;uniform vec3 uColor;uniform float uSeed,uOpacity,uGrain;${NOISE}
   void main(){if(uOpacity<=0.003)discard;vec3 c=uColor;c*=1.+(fbm(vP*vec2(.7,3.2)+uSeed)-.5)*.13;c*=1.-uGrain*0.3*fbm(vP*5.0);gl_FragColor=vec4(c,uOpacity);}`});
function decoMat(hex,seed,grain){const m=shapeBase.clone();m.uniforms.uColor.value=new THREE.Color(hex);m.uniforms.uSeed.value=seed;m.uniforms.uGrain.value=grain;return m;}
function mulberry(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function frond(R,seed){const rnd=mulberry(seed),N=90,pts=[];const h1=rnd()*6.28,h2=rnd()*6.28;
  for(let i=0;i<N;i++){const a=i/N*6.283;let r=R*(0.45+0.55*Math.abs(Math.sin(a*4+h1)));r+=R*0.05*Math.sin(a*2+h2);pts.push(new THREE.Vector2(Math.cos(a)*r*0.62,Math.sin(a)*r*1.5));}
  const g=new THREE.ShapeGeometry(new THREE.Shape(pts));g.center();return g;}
function tri(s){const sh=new THREE.Shape();sh.moveTo(-s,-s);sh.lineTo(s,-s);sh.lineTo(0,s);sh.closePath();const g=new THREE.ShapeGeometry(sh);g.center();return g;}

const organic=[], klee=[];
for(let i=0;i<7;i++){const m=decoMat(THEMES.matisse.palette[i%6],i,0.0);
  const mesh=new THREE.Mesh(frond(2+Math.random()*2,i+3),m);
  mesh.position.set((Math.random()-.5)*36,(Math.random()-.5)*19,-25-Math.random()*4);mesh.rotation.z=Math.random()*6.28;
  mesh.userData={bx:mesh.position.x,by:mesh.position.y,ph:Math.random()*6.28,sp:.1+Math.random()*.2};scene.add(mesh);organic.push(mesh);}
for(let i=0;i<9;i++){const kp=THEMES.klee.palette,c=kp[i%kp.length];
  const t=i%3, geo=t===0?new THREE.PlaneGeometry(2.4,2.4):t===1?new THREE.PlaneGeometry(2.6,1.5):tri(1.5);
  const mesh=new THREE.Mesh(geo,decoMat(c,i,1.0));
  mesh.position.set((Math.random()-.5)*34,(Math.random()-.5)*18,-25-Math.random()*4);mesh.rotation.z=(Math.random()-.5)*0.25;
  mesh.userData={bx:mesh.position.x,by:mesh.position.y,ph:Math.random()*6.28,sp:.06+Math.random()*.1};scene.add(mesh);klee.push(mesh);}

/* ---- deck ---- */
function rr(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function wrap(x,t,X,Y,max,lh){const w=t.split(' ');let l='',y=Y;for(const k of w){const tt=l+k+' ';if(x.measureText(tt).width>max&&l){x.fillText(l,X,y);l=k+' ';y+=lh;}else l=tt;}x.fillText(l,X,y);}
function shot(p,th){const c=document.createElement('canvas');c.width=720;c.height=520;const x=c.getContext('2d');
  x.fillStyle=th.paper;x.fillRect(0,0,720,520);x.fillStyle=th.well;x.fillRect(0,0,720,52);
  ['#e0564a','#e9b84b','#5aa86a'].forEach((d,k)=>{x.fillStyle=d;x.beginPath();x.arc(30+k*26,26,7,0,7);x.fill();});
  x.fillStyle=th.accents[PROJECTS.indexOf(p)%3];x.font='800 46px "Bricolage Grotesque"';x.fillText(p.title,40,250);
  x.fillStyle=th.sub;x.font='20px "Bricolage Grotesque"';x.fillText('screenshot goes here',42,292);return new THREE.CanvasTexture(c);}
function cardFace(p,i,th){const c=document.createElement('canvas');c.width=600;c.height=800;const x=c.getContext('2d');
  rr(x,14,14,572,772,30);x.fillStyle=th.paper;x.fill();x.lineWidth=3;x.strokeStyle='rgba(0,0,0,0.14)';x.stroke();
  x.fillStyle=th.well;rr(x,44,140,512,372,14);x.fill();
  x.fillStyle=th.accents[i];x.font='800 30px "Bricolage Grotesque"';x.fillText('0'+(i+1)+' / 0'+PROJECTS.length,48,108);
  x.fillStyle=th.ink;x.font='800 50px "Bricolage Grotesque"';wrap(x,p.title,48,600,510,52);
  x.fillStyle=th.sub;x.font='22px "Bricolage Grotesque"';wrap(x,p.subtitle,48,660,500,30);
  x.fillStyle=th.accents[i];x.font='34px "Caveat"';x.fillText(th.motif,524,108);return new THREE.CanvasTexture(c);}

const W=3,H=4,deck=[],loader=new THREE.TextureLoader();
const shadowTex=(()=>{const c=document.createElement('canvas');c.width=c.height=256;const x=c.getContext('2d');const g=x.createRadialGradient(128,128,20,128,128,128);g.addColorStop(0,'rgba(0,0,0,.5)');g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;x.fillRect(0,0,256,256);return new THREE.CanvasTexture(c);})();
function buildDeck(){
  const th=THEMES.matisse,N=PROJECTS.length,arm=2.6,pivotY=-3.6,maxRot=0.32;
  for(let k=0;k<2;k++){const m=new THREE.Mesh(new THREE.PlaneGeometry(W,H),new THREE.MeshBasicMaterial({color:0xece6d6,transparent:true,opacity:.45,depthTest:false,depthWrite:false}));
    m.position.set(k?0.4:-0.4,-1.2,-0.4-k*0.2);m.rotation.z=k?-0.12:0.12;m.renderOrder=-10-k;scene.add(m);}
  PROJECTS.forEach((p,i)=>{const t=N>1?i/(N-1):0.5,ang=-maxRot+2*maxRot*t;const grp=new THREE.Group();
    const fanPos=new THREE.Vector3(Math.sin(ang)*arm,pivotY+Math.cos(ang)*arm,i*0.06);grp.position.copy(fanPos);grp.rotation.z=-ang;
    const tex=p.image?loader.load(p.image):shot(p,th);
    const base=new THREE.Mesh(new THREE.PlaneGeometry(W,H),new THREE.MeshBasicMaterial({map:cardFace(p,i,th),transparent:true,depthTest:false,depthWrite:false}));
    const pic=new THREE.Mesh(new THREE.PlaneGeometry(2.56,1.86),new THREE.MeshBasicMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false}));pic.position.set(0,0.37,0.02);
    const sh=new THREE.Mesh(new THREE.PlaneGeometry(W*1.5,H*1.35),new THREE.MeshBasicMaterial({map:shadowTex,transparent:true,opacity:.35,depthTest:false,depthWrite:false}));sh.position.set(.15,-.25,-.06);
    grp.add(sh,base,pic);scene.add(grp);deck.push({grp,base,pic,sh,idx:i,fanPos,fanRot:-ang,isImg:!!p.image});});
}

/* ---- theming ---- */
let cur='matisse', mixTarget=0;
function applyTheme(name){cur=name;const th=THEMES[name];mixTarget=name==='klee'?1:0;
  document.body.style.background=th.bodyBg;document.querySelector('.loading').style.background=th.bodyBg;
  root.style.setProperty('--cream',th.paper);root.style.setProperty('--ink',th.ink);
  document.querySelector('.title h1').style.color=th.titleCss;document.querySelector('.title span').style.color=th.accentText;
  document.querySelector('.sig').style.color=th.titleCss;
  deck.forEach((d,i)=>{const old=d.base.material.map;d.base.material.map=cardFace(PROJECTS[i],i,th);d.base.material.map.needsUpdate=true;if(old)old.dispose();
    if(!d.isImg){const o=d.pic.material.map;d.pic.material.map=shot(PROJECTS[i],th);d.pic.material.map.needsUpdate=true;if(o)o.dispose();}});
  document.querySelectorAll('.themes button').forEach(b=>b.classList.toggle('active',b.dataset.theme===name));
}
document.querySelectorAll('.themes button').forEach(b=>b.addEventListener('click',()=>applyTheme(b.dataset.theme)));

/* ---- interaction ---- */
let mode='fan',presented=-1,hover=-1,parX=0,parTX=0;
const ray=new THREE.Raycaster(),mv=new THREE.Vector2();
function pick(e){mv.x=(e.clientX/innerWidth)*2-1;mv.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(mv,camera);const hit=ray.intersectObjects(deck.map(d=>d.base))[0];return hit?deck.find(d=>d.base===hit.object).idx:-1;}
addEventListener('pointermove',e=>{parTX=-((e.clientX/innerWidth)-0.5)*0.8;if(mode==='fan'){hover=pick(e);renderer.domElement.style.cursor=hover>=0?'pointer':'default';}});
renderer.domElement.addEventListener('click',e=>{if(mode==='present'){present(-1);return;}const i=pick(e);if(i>=0)present(i);});
const card=document.getElementById('card');
function present(i){if(i<0){mode='fan';presented=-1;card.classList.remove('show');document.getElementById('hint').style.opacity=.85;return;}
  mode='present';presented=i;hover=-1;const p=PROJECTS[i];card.style.setProperty('--accent',THEMES[cur].accents[i]);
  document.getElementById('cIdx').textContent='0'+(i+1)+' / 0'+PROJECTS.length;document.getElementById('cTitle').textContent=p.title;
  document.getElementById('cDesc').textContent=p.subtitle;document.getElementById('cVisit').href=p.url;card.classList.add('show');document.getElementById('hint').style.opacity=0;}
document.getElementById('cBack').addEventListener('click',()=>present(-1));

/* ---- loop ---- */
const clk=new THREE.Clock();function L(a,b,t){return a+(b-a)*t;}
function tick(){const t=clk.getElapsedTime();bg.material.uniforms.uTime.value=t;
  bg.material.uniforms.uMix.value=L(bg.material.uniforms.uMix.value,mixTarget,0.05);
  const mf=THEMES[cur].motion;
  organic.forEach(s=>{const u=s.userData;s.position.x=u.bx+Math.sin(t*u.sp+u.ph)*0.4*mf;s.position.y=u.by+Math.sin(t*u.sp*1.2+u.ph)*0.3*mf;s.rotation.z+=0.0006*mf;
    s.material.uniforms.uOpacity.value=L(s.material.uniforms.uOpacity.value,cur==='matisse'?0.85:0,0.06);});
  klee.forEach(s=>{const u=s.userData;s.position.x=u.bx+Math.sin(t*u.sp+u.ph)*0.18*mf;s.position.y=u.by+Math.sin(t*u.sp*1.1+u.ph)*0.14*mf;
    s.material.uniforms.uOpacity.value=L(s.material.uniforms.uOpacity.value,cur==='klee'?0.82:0,0.06);});
  deck.forEach(d=>{const i=d.idx;let tp=d.fanPos.clone(),tr=d.fanRot,ts=1,op=1,boost=0;
    if(mode==='present'){if(i===presented){tp.set(0,-0.1,3.6);tr=0;ts=1.55;boost=2000;}else{tp.z-=1.5;tp.y-=0.5;ts=0.82;op=0.35;}}
    else if(hover>=0){if(i===hover){tp.z+=1.6;tp.y+=0.55;tr=d.fanRot*0.25;ts=1.12;boost=2000;}else{tp.x+=(i<hover?-0.45:0.45);}}
    tp.y+=Math.sin(t*0.5+i)*0.04*mf;
    d.grp.position.lerp(tp,0.12);d.grp.rotation.z=L(d.grp.rotation.z,tr,0.12);const s=L(d.grp.scale.x,ts,0.12);d.grp.scale.set(s,s,s);
    d.base.material.opacity=L(d.base.material.opacity,op,0.12);d.pic.material.opacity=L(d.pic.material.opacity,op,0.12);d.sh.material.opacity=L(d.sh.material.opacity,op*0.35,0.12);
    d.sh.renderOrder=i*10+boost;d.base.renderOrder=i*10+1+boost;d.pic.renderOrder=i*10+2+boost;});
  parX=L(parX,mode==='present'?0:parTX,0.05);camera.position.x=parX;camera.lookAt(parX,-0.4,0);
  renderer.render(scene,camera);requestAnimationFrame(tick);}
(document.fonts&&document.fonts.ready?document.fonts.ready:Promise.resolve()).then(()=>{buildDeck();applyTheme('matisse');tick();setTimeout(()=>document.getElementById('loading').classList.add('hide'),500);});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
